# Netlify configuration for Kimin Şapkası Kimin Başında?
# Static site — no build step needed.

[build]
  publish = "."

# Pretty URLs: clicking /backstage/cards still works
[[redirects]]
  from = "/backstage"
  to = "/backstage/cards.html"
  status = 200

# 404 fallback (optional)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404

# Cache the static assets aggressively
[[headers]]
  for = "/*.html"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
